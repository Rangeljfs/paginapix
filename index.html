<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - Academia Itapemense de Letras</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ouro-escuro: #8a6d3b;
            --ouro-claro: #f1d38e;
            --azul-escuro: #1a2a44;
            --creme: #fffdf9;
        }

        body {
            margin: 0;
            padding: 0;
            /* Fundo Dourado Elegante */
            background: linear-gradient(135deg, #c5a059 0%, #f1d38e 50%, #c5a059 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--creme);
            max-width: 420px;
            width: 100%;
            padding: 45px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            border: 2px solid var(--ouro-escuro);
        }

        /* Detalhe nas bordas internas */
        .container::after {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(138, 109, 59, 0.3);
            pointer-events: none;
            border-radius: 15px;
        }

        .logo {
            font-family: 'Cinzel', serif;
            color: var(--azul-escuro);
            font-size: 1.1rem;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--azul-escuro);
            font-size: 1.7rem;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .divider {
            height: 3px;
            width: 50px;
            background: linear-gradient(to right, var(--ouro-escuro), var(--ouro-claro), var(--ouro-escuro));
            margin: 0 auto 25px;
        }

        .instrucoes {
            font-size: 1rem;
            color: #444;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .pix-box {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--ouro-claro);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .label-pix {
            font-size: 0.75rem;
            color: var(--ouro-escuro);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }

        .pix-key {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--azul-escuro);
            display: block;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .btn-copiar {
            background-color: var(--azul-escuro);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-copiar:hover {
            background-color: #2c4263;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 42, 68, 0.3);
        }

        #status {
            display: none;
            color: #28a745;
            font-size: 0.85rem;
            margin-top: 12px;
            font-weight: 600;
        }

        .footer {
            margin-top: 35px;
            font-size: 0.85rem;
            color: var(--ouro-escuro);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Cássia Cristina da Silva - AIL</div>
        <div class="divider"></div>
        
        <h1>Lançamento de Obras</h1>
        
        <p class="instrucoes">
            Utilize a chave PIX abaixo para realizar o pagamento. Prestigie nossos autores!
        </p>

        <div class="pix-box">
            <span class="label-pix">Chave PIX</span>
            <span class="pix-key" id="pixKey">01079319743</span>
            <button class="btn-copiar" onclick="copiarPix()">Copiar Chave PIX</button>
            <div id="status">✓ Chave copiada!</div>
        </div>

        <div class="footer">
            "Prestigie a literatura de Itapema"
        </div>
    </div>

    <script>
        function copiarPix() {
            const pixValue = document.getElementById('pixKey').innerText;
            
            navigator.clipboard.writeText(pixValue).then(() => {
                const status = document.getElementById('status');
                status.style.display = 'block';
                
                setTimeout(() => {
                    status.style.display = 'none';
                }, 3000);
            }).catch(err => {
                console.error('Erro ao copiar: ', err);
            });
        }
    </script>

</body>
</html>
